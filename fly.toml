app = "strategy-screener"
primary_region = "dfw"

[build]

[env]
  PF_LOCAL = "0"
  PF_DB_PATH = "/data/users.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "pf_data"
  destination = "/data"
