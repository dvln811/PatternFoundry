<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — PatternFoundry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0d0d0d;color:#ddd;font-family:'Inter',sans-serif;min-height:100vh}
a{color:#f97316;text-decoration:none}a:hover{text-decoration:underline}
header{display:flex;align-items:center;padding:1rem 2rem;border-bottom:1px solid #222}
header img{height:36px;margin-right:.75rem}header .brand{font-size:1.25rem;font-weight:700;color:#f97316;margin-right:2rem}
header nav a{margin-right:1.25rem;color:#ddd;font-size:.9rem}header nav a:hover{color:#f97316}
.container{max-width:400px;margin:4rem auto;padding:2rem;background:#181818;border-radius:8px;border:1px solid #222}
h2{margin-bottom:1.5rem;color:#f97316}
.error{background:#3b1111;border:1px solid #f44;color:#f88;padding:.75rem;border-radius:4px;margin-bottom:1rem;font-size:.85rem}
label{display:block;margin-bottom:.25rem;font-size:.85rem;color:#aaa}
input{width:100%;padding:.6rem .75rem;margin-bottom:1rem;background:#111;border:1px solid #333;border-radius:4px;color:#ddd;font-size:.9rem}
input:focus{outline:none;border-color:#f97316}
button{width:100%;padding:.7rem;background:#4caf82;color:#fff;border:none;border-radius:4px;font-size:1rem;font-weight:600;cursor:pointer}
button:hover{background:#3d9e6f}
.links{margin-top:1rem;font-size:.85rem;text-align:center}
</style>
</head>
<body>
<header>
<img src="/static/patternFoundryLogo.png" alt="PatternFoundry">
<span class="brand">PatternFoundry</span>
<nav>
<a href="/dashboard">Dashboard</a>
<a href="/simulator">Simulator</a>
<a href="/chartdesigner">Chart Designer</a>
{% if is_admin %}<a href="/admin/users">Users</a>{% endif %}
</nav>
</header>
<div class="container">
<h2>Login</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" action="/login">
<label for="email">Email</label>
<input type="email" id="email" name="email" required>
<label for="password">Password</label>
<input type="password" id="password" name="password" required>
<button type="submit">Sign In</button>
</form>
<div class="links">
<a href="/register">Create an account</a> &middot; <a href="/forgot">Forgot password?</a>
</div>
</div>
</body>
</html>
