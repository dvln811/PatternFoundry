<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — PatternFoundry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{background:#0d0d0d;color:#ddd;font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#f97316;text-decoration:none}a:hover{color:#fb923c}
.pf-header{background:#0e1217;border-bottom:1px solid #222;padding:8px 16px;display:flex;align-items:center;gap:10px;height:48px}
.pf-header .brand{display:flex;align-items:center;gap:8px;color:#f97316;font-weight:700;text-decoration:none;font-size:1.05rem;text-transform:uppercase;letter-spacing:.3px}
.pf-header .brand img{height:28px}
.container{max-width:380px;margin:80px auto;padding:32px;background:#111;border-radius:8px;border:1px solid #2a2a2a}
h2{margin-bottom:20px;color:#f97316;font-size:1rem;text-transform:uppercase;letter-spacing:.1em}
.error{background:#1a0f0f;border:1px solid #e05c5c44;color:#e05c5c;padding:10px 12px;border-radius:5px;margin-bottom:16px;font-size:.8rem}
label{display:block;margin-bottom:4px;font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;padding:8px 10px;margin-bottom:14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#ddd;font-size:.85rem;font-family:inherit}
input:focus{outline:none;border-color:#4caf82}
button{width:100%;padding:10px;background:#4caf82;color:#0a0a0a;border:none;border-radius:5px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.03em}
button:hover{background:#5cc992}
.links{margin-top:16px;font-size:.8rem;text-align:center;color:#888}
.links a{margin:0 6px}
</style>
</head>
<body>
<header class="pf-header">
  <a href="/" class="brand"><img src="/static/patternFoundryLogo.png" alt="">PatternFoundry</a>
</header>
<div class="container">
<h2>Sign In</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" action="/login">
<label>Email</label>
<input type="email" name="email" value="{{ email or '' }}" required autofocus>
<label>Password</label>
<input type="password" name="password" required>
<button type="submit">Sign In</button>
</form>
<div class="links">
<a href="/register">Create account</a>
</div>
</div>
</body>
</html>
