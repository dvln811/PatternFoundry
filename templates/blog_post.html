<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ post.title or 'Blog' }} — PatternFoundry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#e0e0e0;font-family:Inter,system-ui,sans-serif}
.nav{position:sticky;top:0;z-index:50;background:rgba(13,13,13,0.92);backdrop-filter:blur(10px);border-bottom:1px solid #222;padding:12px 40px;display:flex;align-items:center;justify-content:space-between}
.nav .brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:#f97316;font-weight:700;font-size:1.05rem;text-transform:uppercase;letter-spacing:.3px}
.nav .brand img{height:28px}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{color:#888;font-size:.8rem;text-decoration:none;text-transform:uppercase;letter-spacing:.04em}
.nav-links a:hover{color:#e0e0e0}
.container{max-width:720px;margin:0 auto;padding:80px 40px}
.post-header{margin-bottom:40px}
.post-header h1{font-size:1.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;color:#f97316}
.post-meta{font-size:.78rem;color:#666}
.post-body{line-height:1.75;font-size:.92rem;color:#ccc}
.post-body h1{font-size:1.3rem;font-weight:700;color:#f97316;margin:32px 0 12px;text-transform:uppercase;letter-spacing:.04em;font-family:Inter,system-ui,sans-serif}
.post-body h2{font-size:1.1rem;font-weight:700;color:#e0e0e0;margin:32px 0 12px;text-transform:uppercase;letter-spacing:.03em}
.post-body h3{font-size:.95rem;font-weight:600;color:#e0e0e0;margin:24px 0 8px}
.post-body p{margin-bottom:16px}
.post-body img{max-width:100%;border-radius:6px;border:1px solid #2a2a2a;margin:16px 0}
.post-body code{background:#1a1a1a;padding:2px 6px;border-radius:3px;font-size:.85rem;color:#f97316}
.post-body pre{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:16px;overflow-x:auto;margin:16px 0}
.post-body pre code{background:none;padding:0;color:#ccc}
.post-body blockquote{border-left:3px solid #f97316;padding-left:16px;color:#888;margin:16px 0;font-style:italic}
.post-body ul,.post-body ol{margin:12px 0 16px 24px;color:#bbb}
.post-body li{margin-bottom:6px}
.post-body a{color:#f97316;text-decoration:none}
.post-body a:hover{text-decoration:underline}
.back{display:inline-block;margin-top:48px;color:#888;font-size:.8rem;text-decoration:none}
.back:hover{color:#f97316}
.footer{border-top:1px solid #1a1a1a;padding:24px 40px;text-align:center;color:#555;font-size:.75rem;margin-top:80px}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><img src="/static/patternFoundryLogo.png" alt="">PatternFoundry</a>
  <div class="nav-links">
    <a href="/blog">Blog</a>
    <a href="/docs">Docs</a>
    <a href="/login">Sign In</a>
  </div>
</nav>
<div class="container">
  <div class="post-header">
    <h1>{{ post.title or 'Untitled' }}</h1>
    <div class="post-meta">{{ post.date or '' }}{% if post.author %} · {{ post.author }}{% endif %}</div>
  </div>
  <div class="post-body">{{ post.html | safe }}</div>
  <a href="/blog" class="back">← Back to Blog</a>
</div>
<footer class="footer">© 2026 PatternFoundry. All rights reserved.</footer>
</body>
</html>
