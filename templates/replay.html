<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PatternFoundry - Session Replay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{background:#0d0d0d;color:#ddd;font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.pf-header{background:#0e1217;border-bottom:1px solid #222;padding:8px 16px;display:flex;align-items:center;gap:10px;height:48px;flex-shrink:0}
.pf-header .brand{display:flex;align-items:center;gap:8px;color:#f97316;font-weight:700;text-decoration:none;font-size:1.05rem;text-transform:uppercase;letter-spacing:.3px}
.pf-header .brand img{height:28px;width:auto}
.pf-header nav{margin-left:auto;display:flex;gap:4px;align-items:center}
.pf-header nav a{padding:5px 14px;border-radius:5px;font-size:.78rem;font-weight:600;text-decoration:none;color:#bbb;border:1px solid #2a2a2a;text-transform:uppercase}
.pf-header nav a:hover{border-color:#4caf82;color:#ddd}
.pf-header nav a.active{color:#4caf82;border-color:#4caf82}
.avatar-wrap{position:relative;margin-left:auto}.avatar-btn{width:32px;height:32px;border-radius:50%;background:#2a2a2a;border:1px solid #3a3a3a;color:#e0e0e0;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}.avatar-btn:hover{border-color:#4caf82}.avatar-menu{display:none;position:absolute;top:38px;right:0;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:12px;min-width:160px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.5)}.avatar-wrap.open .avatar-menu{display:block}.avatar-menu a{display:block;color:#ccc;font-size:.75rem;text-decoration:none;padding:5px 0}.avatar-menu a:hover{color:#4caf82}.avatar-menu-name{color:#e0e0e0;font-size:.8rem;font-weight:600}.avatar-menu-email{color:#666;font-size:.7rem;margin-top:2px}
.replay-wrap{flex:1;display:flex;flex-direction:column;padding:16px 24px}
.replay-header{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.replay-header h1{font-size:1.1rem;color:#f97316;font-weight:700}
.replay-header .meta{font-size:.75rem;color:#888}
.replay-header .back{color:#888;font-size:.8rem;text-decoration:none;margin-right:8px}
.replay-header .back:hover{color:#f97316}
#replay-chart{flex:1;min-height:400px;border:1px solid #1a1a1a;border-radius:6px;overflow:hidden}
.trades-panel{margin-top:12px;max-height:180px;overflow-y:auto;border:1px solid #1a1a1a;border-radius:6px}
.trades-panel table{width:100%;border-collapse:collapse;font-size:.72rem}
.trades-panel th{text-align:left;padding:6px 10px;background:#111;color:#aaa;font-weight:600;position:sticky;top:0}
.trades-panel td{padding:5px 10px;border-top:1px solid #1a1a1a;color:#ccc}
.trades-panel .win{color:#4caf82}.trades-panel .loss{color:#e05c5c}
</style>
</head>
<body>
<header class="pf-header">
  <a class="brand" href="/"><img src="/static/patternFoundryLogo.png" alt="">PatternFoundry</a>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/simulator">Simulator</a>
    <a href="/chartdesigner">Chart Designer</a>
    <a href="/stats" class="active">Stats</a>
    <a href="/settings">Settings</a>
    <a href="/docs">Docs</a>
    {% if is_admin %}<a href="/admin">Admin</a>{% endif %}
    <div class="avatar-wrap" onclick="this.classList.toggle('open')"><div class="avatar-btn">{{ initials or 'U' }}</div><div class="avatar-menu"><div class="avatar-menu-name">{{ user_name or 'User' }}</div><div class="avatar-menu-email">{{ user or '' }}</div><hr style="border:none;border-top:1px solid #2a2a2a;margin:8px 0"><a href="/logout">Sign Out</a></div></div>
  </nav>
</header>
<div class="replay-wrap">
  <div class="replay-header">
    <a class="back" href="/stats">&larr; Stats</a>
    <h1 id="replay-title">Session Replay</h1>
    <span class="meta" id="replay-meta"></span>
  </div>
  <div id="replay-chart"></div>
  <div class="trades-panel">
    <table>
      <thead><tr><th>Dir</th><th>Qty</th><th>Entry</th><th>Exit</th><th>P/L</th><th>Reason</th></tr></thead>
      <tbody id="trades-body"></tbody>
    </table>
  </div>
</div>
<script>
const SESSION_ID = {{ session_id }};
(async () => {
  const res = await fetch(`/api/sessions/${SESSION_ID}`, {credentials:'include'});
  if (!res.ok) { document.getElementById('replay-title').textContent = 'Session not found'; return; }
  const data = await res.json();

  document.getElementById('replay-title').textContent = `${data.character || 'Unknown'} — ${data.date}`;
  document.getElementById('replay-meta').textContent = `${data.trades} trades · P/L: $${(data.pnl||0).toFixed(2)}`;

  // Chart
  const chartEl = document.getElementById('replay-chart');
  const chart = LightweightCharts.createChart(chartEl, {
    layout: { background: { color: '#0d0d0d' }, textColor: '#999' },
    grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    crosshair: { mode: 0 },
  });
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#4caf82', downColor: '#e05c5c',
    borderUpColor: '#4caf82', borderDownColor: '#e05c5c',
    wickUpColor: '#4caf82', wickDownColor: '#e05c5c',
  });

  const candles = (data.candles || []).map(c => ({
    time: c.t, open: c.o, high: c.h, low: c.l, close: c.c
  }));
  candleSeries.setData(candles);

  // Buy/sell markers
  const trades = data.trade_list || [];
  const markers = [];
  for (const t of trades) {
    if (t.entry_time) {
      markers.push({
        time: Math.floor(t.entry_time / 60) * 60,
        position: t.direction === 'long' ? 'belowBar' : 'aboveBar',
        color: t.direction === 'long' ? '#4caf82' : '#e05c5c',
        shape: t.direction === 'long' ? 'arrowUp' : 'arrowDown',
        text: t.direction === 'long' ? 'BUY' : 'SELL',
      });
    }
    if (t.exit_time) {
      markers.push({
        time: Math.floor(t.exit_time / 60) * 60,
        position: t.direction === 'long' ? 'aboveBar' : 'belowBar',
        color: '#f0c040',
        shape: 'circle',
        text: (t.exit_reason || 'Close').slice(0, 6),
      });
    }
  }
  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
  chart.timeScale().fitContent();

  // Trades table
  const tbody = document.getElementById('trades-body');
  for (const t of trades) {
    const cls = (t.pnl || 0) >= 0 ? 'win' : 'loss';
    tbody.innerHTML += `<tr>
      <td>${(t.direction||'').toUpperCase()}</td>
      <td>${t.qty||1}</td>
      <td>${(t.entry_price||0).toFixed(2)}</td>
      <td>${(t.exit_price||0).toFixed(2)}</td>
      <td class="${cls}">$${(t.pnl||0).toFixed(2)}</td>
      <td>${t.exit_reason||''}</td>
    </tr>`;
  }

  // Responsive resize
  new ResizeObserver(() => chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight })).observe(chartEl);
})();
</script>
</body>
</html>
