<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PatternFoundry — Chart Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/indicators.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    body { background: #0b0d11; color: #ddd; font-family: Inter, system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    .pf-header { background: #0e1217; border-bottom: 1px solid #222; padding: 8px 16px; display: flex; align-items: center; gap: 10px; height: 48px; flex-shrink: 0; z-index: 100; }
    .pf-header .brand { display: flex; align-items: center; gap: 8px; color: #f97316; font-weight: 700; text-decoration: none; font-size: 1.05rem; text-transform: uppercase; letter-spacing: .3px; }
    .pf-header .brand img { height: 28px; width: auto; }
    .pf-header .page-title { color: #f97316; font-size: 0.85rem; margin-left: 8px; border-left: 1px solid #333; padding-left: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
    .pf-header nav { margin-left: auto; display: flex; gap: 4px; }
    .pf-header nav a { padding: 5px 14px; border-radius: 5px; font-size: 0.78rem; font-weight: 600; text-decoration: none; color: #bbb; border: 1px solid #2a2a2a; text-transform: uppercase; }
    .pf-header nav a:hover { border-color: #4caf82; color: #ddd; }
    .pf-header nav a.active { color: #4caf82; border-color: #4caf82; }

    /* ── Layout ── */
    main { display: grid; grid-template-columns: 360px 1fr; gap: 10px; padding: 10px; flex: 1; overflow: hidden; }

    /* ── Left panel ── */
    aside.panel {
      background: #111; border: 1px solid #1e1e1e; border-radius: 8px;
      padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    }
    aside.panel h3 { font-size: 0.68rem; color: #ddd; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }

    .field { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .field label { flex: 0 0 130px; color: #888; font-size: 0.72rem; }
    select, input[type="text"], input[type="number"] {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #ddd;
      padding: 4px 6px; border-radius: 4px; font-size: 0.78rem; font-family: inherit; color-scheme: dark;
    }
    input[type="range"] { width: 100%; accent-color: #f97316; }

    /* Collapsible categories */
    details.cat { border: 1px solid #222; border-radius: 6px; background: #0e0e0e; }
    details.cat[open] { background: #0e1217; }
    details.cat > summary { padding: 6px 10px; cursor: pointer; color: #aaa; font-size: 0.78rem; list-style: none; user-select: none; }
    details.cat > summary::before { content: '▶ '; color: #555; font-size: 0.65rem; }
    details.cat[open] > summary::before { content: '▼ '; color: #4caf82; }
    details.cat > .cat-body { padding: 8px 10px; border-top: 1px solid #1a1a1a; }

    /* Slider rows */
    .sl { margin-bottom: 8px; font-size: 0.72rem; }
    .sl .sl-head { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .sl .sl-name { color: #bbb; }
    .sl .sl-val  { color: #f97316; font-weight: 600; }

    /* Action buttons */
    .actions { display: flex; gap: 6px; margin-top: 4px; }
    .btn { background: transparent; border: 1px solid #555; color: #bbb; padding: 6px 12px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: inherit; flex: 1; }
    .btn:hover { opacity: 0.8; }
    .btn-purple { border-color: #a78bfa; color: #a78bfa; }
    .btn-green  { border-color: #4caf82; color: #4caf82; }
    .btn-red    { border-color: #e05c5c; color: #e05c5c; }

    #status { font-size: 0.7rem; color: #888; min-height: 16px; }

    /* ── Right: chart area ── */
    section { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .top-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; padding: 6px 10px; background: #0e1217; border: 1px solid #1e1e1e; border-radius: 6px; font-size: 0.78rem; flex-shrink: 0; }
    .top-bar label { color: #888; display: flex; align-items: center; gap: 6px; }
    #chart { flex: 1; background: #0e0e0e; border-radius: 4px; min-height: 0; position: relative; }
    .tv-lightweight-charts a[href*="tradingview"], .tv-lightweight-charts a[href*="lightweight-charts"] { display: none !important; }
  </style>
</head>
<body>

<header class="pf-header">
  <a href="/" class="brand"><img src="/static/patternFoundryLogo.png" alt="PatternFoundry"> PatternFoundry</a>
  <span class="page-title">Chart Designer</span>
  <nav>
    <a href="/">Simulator</a>
    <a href="/chartdesigner" class="active">Chart Designer</a>
  </nav>
</header>

<main>
  <!-- LEFT: settings panel -->
  <aside class="panel">
    <h3>Generator Settings</h3>

    <div class="field">
      <label>Base Preset</label>
      <select id="preset" style="flex:1" onchange="loadPreset()">
        <option value="">-- select --</option>
        <option value="ES">ES (calm futures)</option>
        <option value="NQ">NQ (active)</option>
        <option value="SPY">SPY (quiet)</option>
        <option value="TSLA">TSLA (gappy)</option>
        <option value="GME">GME (high-beta retail)</option>
        <option value="CL">CL (choppy)</option>
      </select>
    </div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="c-name" value="Custom" style="flex:1;max-width:none">
    </div>
    <input type="hidden" id="p-lo" value="5000">
    <input type="hidden" id="p-hi" value="7000">
    <input type="hidden" id="p-tick" value="0.25">

    <details class="cat" open><summary>Volatility</summary><div class="cat-body" id="cat-vol"></div></details>
    <details class="cat"><summary>Drift</summary><div class="cat-body" id="cat-drift"></div></details>
    <details class="cat"><summary>Wicks</summary><div class="cat-body" id="cat-wick"></div></details>
    <details class="cat"><summary>Regime Durations</summary><div class="cat-body" id="cat-regime"></div></details>
    <details class="cat"><summary>Volume</summary><div class="cat-body" id="cat-volume"></div></details>
    <details class="cat"><summary>Gaps</summary><div class="cat-body" id="cat-gap"></div></details>
    <details class="cat"><summary>Events</summary><div class="cat-body" id="cat-event"></div></details>

    <div class="actions">
      <button class="btn" onclick="loadPreset()">Reload</button>
      <button class="btn btn-purple" onclick="generate()" id="gen-btn">Generate</button>
      <button class="btn btn-red" onclick="cancelGenerate()" id="cancel-btn" style="display:none">Cancel</button>
      <button class="btn btn-green" onclick="saveCharacter()">Save</button>
    </div>
    <div id="status"></div>
  </aside>

  <!-- RIGHT: chart -->
  <section>
    <div class="top-bar">
      <label>Timeframe:
        <select id="tf" onchange="onTfChange()">
          <option value="60" selected>1m</option>
          <option value="300">5m</option>
          <option value="900">15m</option>
          <option value="3600">1H</option>
          <option value="14400">4H</option>
          <option value="86400">1D</option>
        </select>
      </label>
      <label>History:
        <select id="duration">
          <option value="390">1 session</option>
          <option value="1950" selected>1 week</option>
          <option value="7800">1 month</option>
          <option value="49920">6 months</option>
        </select>
      </label>
      <label>Seed: <input type="number" id="seed" placeholder="random" style="width:80px"></label>
    </div>
    <div id="chart"></div>
  </section>
</main>

<div id="tip-popover" style="position:fixed;z-index:9999;display:none;pointer-events:none;background:#0e1217;border:1px solid #f97316;border-radius:8px;padding:14px 16px;max-width:380px;min-width:260px;box-shadow:0 8px 28px rgba(0,0,0,0.7);color:#ddd;font-size:0.8rem;line-height:1.5">
  <div class="tip-title" style="font-size:0.95rem;font-weight:700;color:#f97316;margin-bottom:6px"></div>
  <div class="tip-body" style="color:#bbb"></div>
  <div class="tip-diagram" style="margin-top:10px;padding:8px;background:#0a0c10;border:1px solid #1a1a1a;border-radius:6px;display:none;justify-content:center"></div>
</div>

<script>
const TIPS = {
  'vol-chop': { title:'Chop Volatility', body:'Size of candle bodies during sideways/consolidation phases. Higher values create wider candles even when price isn\u2019t trending.' },
  'vol-trend': { title:'Trend Volatility', body:'Candle body size during trending regimes. Low = small controlled bars. High = urgent, large trend candles.' },
  'vol-impulse': { title:'Impulse Volatility', body:'Body size during rare impulse bursts \u2014 news events, liquidity flushes. These fire briefly (2\u20135 bars) and produce outsized moves.' },
  'vol-gaphold': { title:'Gap Hold Volatility', body:'Body size during the bar immediately after a gap. Usually dampened (price consolidates after the jump).' },
  'drift-chop-sigma': { title:'Chop Drift Sigma', body:'Randomness of per-candle drift during chop. Higher = more erratic chop with frequent direction flips.' },
  'drift-trend-sigma': { title:'Trend Drift Sigma', body:'Noise around the trend direction. Low = clean trending. High = choppy trends with frequent pullbacks.' },
  'drift-trend-mag': { title:'Trend Magnitude', body:'Strength of directional drift during trends. 0.1 = gentle drift, 0.5+ = aggressive steep trends.' },
  'drift-impulse-mag': { title:'Impulse Magnitude', body:'Size of each impulse candle move. A value of 1.5 at $200 price \u2248 0.75% per-candle burst.' },
  'drift-global-bias': { title:'Global Bias', body:'Permanent per-candle drift. Positive = slow bull grind. Negative = slow bear grind. Small values (0.01\u20130.05) are realistic.' },
  'wick-chop': { title:'Chop Wick Ratio', body:'Wick length as a multiple of body during chop. High values create hammer/doji-heavy sideways action.' },
  'wick-trend': { title:'Trend Wick Ratio', body:'Wick-to-body ratio on trend candles. Low = marubozu-style clean trend bars.' },
  'wick-impulse': { title:'Impulse Wick Ratio', body:'Wicks on impulse candles. Usually low \u2014 impulses drive through without rejection.' },
  'wick-gaphold': { title:'Gap Hold Wick Ratio', body:'Wick size on the bar after a gap. Low = gap holds cleanly.' },
  'wick-asym': { title:'Wick Asymmetry', body:'0 = symmetric wicks. 1 = wicks heavily biased AGAINST drift (simulates rejection/liquidity grabs).' },
  'reg-chop': { title:'Chop Duration', body:'Average candles per chop regime. Longer = more consolidation, good for breakout strategies.' },
  'reg-trendup': { title:'Trend Up Duration', body:'Average candles per up-trend regime before transitioning.' },
  'reg-trenddn': { title:'Trend Down Duration', body:'Average candles per down-trend regime.' },
  'reg-impulse': { title:'Impulse Duration', body:'Average candles per impulse burst. Typically brief \u2014 2\u20135 bars is realistic.' },
  'vol-base': { title:'Base Volume', body:'Baseline per-1m-candle volume. ES/NQ ~1000, liquid stocks 2000\u20135000.' },
  'vol-open': { title:'Open Multiplier', body:'Volume multiplier for the first 20% of the session (opening drive).' },
  'vol-midday': { title:'Midday Multiplier', body:'Volume multiplier for the middle of the session (lunch lull).' },
  'vol-close': { title:'Close Multiplier', body:'Volume multiplier for the last 20% of the session (power hour).' },
  'vol-spike-p': { title:'Spike Probability', body:'Chance of an above-average volume candle. 0.10 = ~1 in 10 bars shows a spike.' },
  'gap-prob': { title:'Gap Probability', body:'Chance of an overnight gap at each RTH open. 0.35 \u2248 gap on 1 day in 3. 0.0 = no gaps (24h futures).' },
  'gap-min': { title:'Gap Min (%)', body:'Smallest possible gap as a fraction of price. 0.005 = 0.5%.' },
  'gap-max': { title:'Gap Max (%)', body:'Largest possible gap. 0.02 = 2%. Big-news gaps can reach 10%+.' },
  'gap-intra': { title:'Intraday Spike Prob', body:'Rare mid-session gap (news shock during RTH). Almost never fires.' },
  'ev-stab-prob': { title:'Wick Stab Probability', body:'Chance of a liquidity-grab: a bar that spikes a long wick beyond normal range, then closes back near the body.' },
  'ev-stab-mag': { title:'Wick Stab Magnitude', body:'Size of wick stabs when they fire, as multiples of the candle body.' },
};

// ── Tip popover logic ─────────────────────────────────────────────────────────
(function(){
  const pop = document.getElementById('tip-popover');
  const titleEl = pop.querySelector('.tip-title');
  const bodyEl  = pop.querySelector('.tip-body');
  const diagEl  = pop.querySelector('.tip-diagram');
  document.addEventListener('mouseover', e => {
    const t = e.target.closest('[data-tip-id]');
    if (!t) return;
    const tip = TIPS[t.dataset.tipId];
    if (!tip) return;
    titleEl.textContent = tip.title || '';
    bodyEl.textContent  = tip.body || '';
    diagEl.style.display = 'none';
    pop.style.display = 'block';
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + 380 > window.innerWidth) x = e.clientX - 380;
    if (y + 200 > window.innerHeight) y = window.innerHeight - 200;
    pop.style.left = Math.max(8, x) + 'px';
    pop.style.top  = Math.max(8, y) + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('[data-tip-id]')) pop.style.display = 'none';
  });
})();

const SLIDERS = {
  vol: [
    { id: 'vol-chop',    label: 'Chop',    min: 0.01, max: 5,   step: 0.01, def: 1.0  },
    { id: 'vol-trend',   label: 'Trend',   min: 0.01, max: 10,  step: 0.01, def: 2.0  },
    { id: 'vol-impulse', label: 'Impulse', min: 0.01, max: 20,  step: 0.01, def: 4.0  },
    { id: 'vol-gaphold', label: 'Gap Hold',min: 0.01, max: 5,   step: 0.01, def: 1.5  },
  ],
  drift: [
    { id: 'drift-chop-sigma',    label: 'Chop Sigma',       min: 0, max: 1,   step: 0.001, def: 0.05  },
    { id: 'drift-trend-sigma',   label: 'Trend Sigma',      min: 0, max: 2,   step: 0.001, def: 0.15  },
    { id: 'drift-trend-mag',     label: 'Trend Magnitude',  min: 0, max: 5,   step: 0.01,  def: 0.3   },
    { id: 'drift-impulse-mag',   label: 'Impulse Magnitude',min: 0, max: 10,  step: 0.01,  def: 1.5   },
    { id: 'drift-global-bias',   label: 'Global Bias',      min: -0.5, max: 0.5, step: 0.001, def: 0.0 },
  ],

    { id: 'wick-chop',    label: 'Chop Ratio',    min: 0, max: 5, step: 0.1, def: 2.0 },
    { id: 'wick-trend',   label: 'Trend Ratio',   min: 0, max: 5, step: 0.1, def: 0.6 },
    { id: 'wick-impulse', label: 'Impulse Ratio', min: 0, max: 5, step: 0.1, def: 0.4 },
    { id: 'wick-gaphold', label: 'Gap Hold Ratio',min: 0, max: 5, step: 0.1, def: 0.3 },
    { id: 'wick-asym',    label: 'Asymmetry',     min: 0, max: 1, step: 0.01, def: 0.3 },
  ],
  regime: [
    { id: 'reg-chop',    label: 'Chop Duration',     min: 1, max: 100, step: 1, def: 25 },
    { id: 'reg-trendup', label: 'Trend Up Duration', min: 1, max: 100, step: 1, def: 20 },
    { id: 'reg-trenddn', label: 'Trend Down Duration',min:1, max: 100, step: 1, def: 20 },
    { id: 'reg-impulse', label: 'Impulse Duration',  min: 1, max: 20,  step: 1, def: 3  },
  ],
  volume: [
    { id: 'vol-base',    label: 'Base Volume',    min: 100, max: 10000, step: 100, def: 1000 },
    { id: 'vol-open',    label: 'Open Mult',      min: 0.5, max: 5,    step: 0.1, def: 2.2  },
    { id: 'vol-midday',  label: 'Midday Mult',    min: 0.1, max: 2,    step: 0.1, def: 0.8  },
    { id: 'vol-close',   label: 'Close Mult',     min: 0.5, max: 5,    step: 0.1, def: 1.3  },
    { id: 'vol-spike-p', label: 'Spike Prob',     min: 0,   max: 0.5,  step: 0.01, def: 0.1 },
  ],
  gap: [
    { id: 'gap-prob',    label: 'Session Prob',   min: 0, max: 1,    step: 0.01, def: 0.0  },
    { id: 'gap-min',     label: 'Min Size',       min: 0, max: 0.1,  step: 0.001, def: 0.005 },
    { id: 'gap-max',     label: 'Max Size',       min: 0, max: 0.2,  step: 0.001, def: 0.02  },
    { id: 'gap-intra',   label: 'Intraday Prob',  min: 0, max: 0.05, step: 0.001, def: 0.0  },
  ],
  event: [
    { id: 'ev-stab-prob', label: 'Wick Stab Prob', min: 0, max: 0.2, step: 0.001, def: 0.02 },
    { id: 'ev-stab-mag',  label: 'Wick Stab Mag',  min: 0, max: 10,  step: 0.1,   def: 3.0  },
  ],
};

const CAT_MAP = { vol:'cat-vol', drift:'cat-drift', wick:'cat-wick', regime:'cat-regime', volume:'cat-volume', gap:'cat-gap', event:'cat-event' };

function buildSliders() {
  for (const [cat, sliders] of Object.entries(SLIDERS)) {
    const el = document.getElementById(CAT_MAP[cat]);
    el.innerHTML = sliders.map(s => {
      const hint = TIPS[s.id] ? `<span data-tip-id="${s.id}" style="display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;border-radius:50%;background:#2a2a2a;color:#888;font-size:0.65rem;cursor:help;margin-left:4px;font-weight:700">?</span>` : '';
      return `
      <div class="sl">
        <div class="sl-head"><span class="sl-name">${s.label} ${hint}</span><span class="sl-val" id="${s.id}-val">${s.def}</span></div>
        <input type="range" id="${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.def}"
          oninput="document.getElementById('${s.id}-val').textContent=parseFloat(this.value).toFixed(this.step<0.01?3:this.step<0.1?2:this.step<1?1:0)">
      </div>`;
    }).join('');
  }
}

function setSlider(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = val;
  const step = parseFloat(el.step);
  const decimals = step < 0.01 ? 3 : step < 0.1 ? 2 : step < 1 ? 1 : 0;
  document.getElementById(id + '-val').textContent = parseFloat(val).toFixed(decimals);
}

function getSlider(id) { return parseFloat(document.getElementById(id).value); }

// ── Preset data ───────────────────────────────────────────────────────────────
const PRESETS = {
  ES:   { name:'ES (calm futures)',      lo:5000,  hi:7000,  tick:0.25, vc:1.0,  vt:2.0,  vi:4.0,  vg:1.5, cs:0.05, ts:0.15, tm:0.25, im:1.5,  gb:0.02,  wcr:2.0, wtr:0.5, wir:0.3, wgr:0.3, wa:0.3, rc:25, ru:20, rd:20, ri:3, vb:1000, vo:2.2, vm:0.8, vcl:1.3, vsp:0.10, gp:0.0,  gn:0.005, gx:0.02,  gi:0.0,   ep:0.02, em:3.0 },
  NQ:   { name:'NQ (active)',            lo:18000, hi:22000, tick:0.25, vc:2.5,  vt:5.0,  vi:10.0, vg:1.5, cs:0.1,  ts:0.3,  tm:0.5,  im:3.0,  gb:0.03,  wcr:1.8, wtr:1.0, wir:0.4, wgr:0.3, wa:0.3, rc:15, ru:18, rd:18, ri:4, vb:800,  vo:2.2, vm:0.8, vcl:1.3, vsp:0.10, gp:0.0,  gn:0.005, gx:0.02,  gi:0.0,   ep:0.04, em:3.0 },

  TSLA: { name:'TSLA (gappy)',           lo:200,   hi:280,   tick:0.01, vc:0.2,  vt:0.45, vi:0.9,  vg:1.5, cs:0.03, ts:0.08, tm:0.08, im:0.4,  gb:0.0,   wcr:1.2, wtr:0.4, wir:0.25,wgr:0.3, wa:0.2, rc:20, ru:15, rd:15, ri:4, vb:3000, vo:2.2, vm:0.8, vcl:1.3, vsp:0.12, gp:0.25, gn:0.005, gx:0.025, gi:0.005, ep:0.03, em:2.5 },
  GME:  { name:'GME (high-beta retail)', lo:18,    hi:35,    tick:0.01, vc:0.04, vt:0.09, vi:0.25, vg:1.5, cs:0.008,ts:0.02, tm:0.02, im:0.08, gb:0.0,   wcr:1.5, wtr:0.5, wir:0.3, wgr:0.3, wa:0.2, rc:10, ru:8,  rd:8,  ri:4, vb:2500, vo:2.2, vm:0.8, vcl:1.3, vsp:0.15, gp:0.30, gn:0.01,  gx:0.05,  gi:0.005, ep:0.04, em:2.5 },
  CL:   { name:'CL (choppy)',            lo:70,    hi:90,    tick:0.01, vc:0.15, vt:0.3,  vi:0.6,  vg:1.5, cs:0.015,ts:0.04, tm:0.05, im:0.2,  gb:0.0,   wcr:1.5, wtr:0.5, wir:0.4, wgr:0.3, wa:0.15,rc:30, ru:10, rd:10, ri:2, vb:600,  vo:2.2, vm:0.8, vcl:1.3, vsp:0.10, gp:0.08, gn:0.003, gx:0.015, gi:0.0,   ep:0.03, em:3.0 },
};

function loadPreset() {
  const key = document.getElementById('preset').value;
  const p   = PRESETS[key];
  if (!p) return;
  document.getElementById('c-name').value = p.name;
  document.getElementById('p-lo').value   = p.lo;
  document.getElementById('p-hi').value   = p.hi;
  document.getElementById('p-tick').value = p.tick;
  setSlider('vol-chop', p.vc);  setSlider('vol-trend', p.vt); setSlider('vol-impulse', p.vi); setSlider('vol-gaphold', p.vg);
  setSlider('drift-chop-sigma', p.cs); setSlider('drift-trend-sigma', p.ts); setSlider('drift-trend-mag', p.tm); setSlider('drift-impulse-mag', p.im); setSlider('drift-global-bias', p.gb);
  setSlider('wick-chop', p.wcr); setSlider('wick-trend', p.wtr); setSlider('wick-impulse', p.wir); setSlider('wick-gaphold', p.wgr); setSlider('wick-asym', p.wa);
  setSlider('reg-chop', p.rc); setSlider('reg-trendup', p.ru); setSlider('reg-trenddn', p.rd); setSlider('reg-impulse', p.ri);
  setSlider('vol-base', p.vb); setSlider('vol-open', p.vo); setSlider('vol-midday', p.vm); setSlider('vol-close', p.vcl); setSlider('vol-spike-p', p.vsp);
  setSlider('gap-prob', p.gp); setSlider('gap-min', p.gn); setSlider('gap-max', p.gx); setSlider('gap-intra', p.gi);
  setSlider('ev-stab-prob', p.ep); setSlider('ev-stab-mag', p.em);
}

buildSliders();
// Default to ES
document.getElementById('preset').value = 'ES';
loadPreset();

// ── Chart ─────────────────────────────────────────────────────────────────────
let chart, candleSeries, volSeries, allCandles = [], abortCtrl = null;

function initChart() {
  const el = document.getElementById('chart');
  if (chart) chart.remove();
  chart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: { background: { color: '#0e0e0e' }, textColor: '#888', attributionLogo: false },
    grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
    crosshair: { mode: 0 },
    rightPriceScale: { borderColor: '#333' },
    timeScale: { borderColor: '#333', timeVisible: true },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#4caf82', downColor: '#e05c5c',
    borderUpColor: '#4caf82', borderDownColor: '#e05c5c',
    wickUpColor: '#4caf82', wickDownColor: '#e05c5c',
  });
  volSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol', color: '#4caf8266' });
  chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
  new ResizeObserver(() => chart.applyOptions({ width: el.clientWidth, height: el.clientHeight })).observe(el);
}

function rebucket(candles, tf) {
  if (tf <= 60) return candles;
  const out = []; let b = null;
  for (const c of candles) {
    const bt = Math.floor(c.time / tf) * tf;
    if (!b || b.time !== bt) { if (b) out.push(b); b = { time: bt, open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume }; }
    else { b.high = Math.max(b.high, c.high); b.low = Math.min(b.low, c.low); b.close = c.close; b.volume += c.volume; }
  }
  if (b) out.push(b);
  return out;
}

function renderCandles() {
  const tf = parseInt(document.getElementById('tf').value);
  const bucketed = rebucket(allCandles, tf);
  candleSeries.setData(bucketed.map(c => ({ time: c.time, open: c.open, high: c.high, low: c.low, close: c.close })));
  volSeries.setData(bucketed.map(c => ({ time: c.time, value: c.volume, color: c.close >= c.open ? '#4caf8266' : '#e05c5c66' })));
  chart.timeScale().fitContent();
}

function onTfChange() { if (allCandles.length) renderCandles(); }

async function generate() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  document.getElementById('gen-btn').style.display    = 'none';
  document.getElementById('cancel-btn').style.display = 'inline-block';
  document.getElementById('status').textContent = 'Generating…';

  const seedVal = document.getElementById('seed').value.trim();
  const payload = {
    name: document.getElementById('c-name').value,
    p_lo: document.getElementById('p-lo').value,
    p_hi: document.getElementById('p-hi').value,
    p_tick: document.getElementById('p-tick').value,
    n: parseInt(document.getElementById('duration').value),
    seed: seedVal || null,
    vol_chop: getSlider('vol-chop'), vol_trend: getSlider('vol-trend'),
    vol_impulse: getSlider('vol-impulse'), vol_gaphold: getSlider('vol-gaphold'),
    drift_chop_sigma: getSlider('drift-chop-sigma'), drift_trend_sigma: getSlider('drift-trend-sigma'),
    drift_trend_mag: getSlider('drift-trend-mag'), drift_impulse_mag: getSlider('drift-impulse-mag'),
    drift_global_bias: getSlider('drift-global-bias'),
    wick_chop: getSlider('wick-chop'), wick_trend: getSlider('wick-trend'),
    wick_impulse: getSlider('wick-impulse'), wick_gaphold: getSlider('wick-gaphold'), wick_asym: getSlider('wick-asym'),
    reg_chop: getSlider('reg-chop'), reg_trendup: getSlider('reg-trendup'),
    reg_trenddn: getSlider('reg-trenddn'), reg_impulse: getSlider('reg-impulse'),
    vol_base: getSlider('vol-base'), vol_open: getSlider('vol-open'),
    vol_midday: getSlider('vol-midday'), vol_close: getSlider('vol-close'), vol_spike_p: getSlider('vol-spike-p'),
    gap_prob: getSlider('gap-prob'), gap_min: getSlider('gap-min'),
    gap_max: getSlider('gap-max'), gap_intra: getSlider('gap-intra'),
    ev_stab_prob: getSlider('ev-stab-prob'), ev_stab_mag: getSlider('ev-stab-mag'),
  };

  try {
    const res  = await fetch('/api/character/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: abortCtrl.signal });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allCandles = data.candles;
    if (!seedVal) document.getElementById('seed').value = data.seed;
    renderCandles();
    document.getElementById('status').textContent = `${data.n} candles · seed ${data.seed}`;
  } catch(e) {
    if (e.name !== 'AbortError') document.getElementById('status').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('gen-btn').style.display    = 'inline-block';
    document.getElementById('cancel-btn').style.display = 'none';
    abortCtrl = null;
  }
}

function cancelGenerate() { if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; } }

async function saveCharacter() {
  const name = document.getElementById('c-name').value.trim() || 'Custom';
  const payload = {
    name, p_lo: document.getElementById('p-lo').value, p_hi: document.getElementById('p-hi').value,
    p_tick: document.getElementById('p-tick').value,
    vol_chop: getSlider('vol-chop'), vol_trend: getSlider('vol-trend'),
    vol_impulse: getSlider('vol-impulse'), vol_gaphold: getSlider('vol-gaphold'),
    drift_chop_sigma: getSlider('drift-chop-sigma'), drift_trend_sigma: getSlider('drift-trend-sigma'),
    drift_trend_mag: getSlider('drift-trend-mag'), drift_impulse_mag: getSlider('drift-impulse-mag'),
    drift_global_bias: getSlider('drift-global-bias'),
    wick_chop: getSlider('wick-chop'), wick_trend: getSlider('wick-trend'),
    wick_impulse: getSlider('wick-impulse'), wick_gaphold: getSlider('wick-gaphold'), wick_asym: getSlider('wick-asym'),
    reg_chop: getSlider('reg-chop'), reg_trendup: getSlider('reg-trendup'),
    reg_trenddn: getSlider('reg-trenddn'), reg_impulse: getSlider('reg-impulse'),
    vol_base: getSlider('vol-base'), vol_open: getSlider('vol-open'),
    vol_midday: getSlider('vol-midday'), vol_close: getSlider('vol-close'), vol_spike_p: getSlider('vol-spike-p'),
    gap_prob: getSlider('gap-prob'), gap_min: getSlider('gap-min'),
    gap_max: getSlider('gap-max'), gap_intra: getSlider('gap-intra'),
    ev_stab_prob: getSlider('ev-stab-prob'), ev_stab_mag: getSlider('ev-stab-mag'),
  };
  const res = await fetch('/api/character/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  const d = await res.json();
  document.getElementById('status').textContent = d.error ? 'Error: ' + d.error : `Saved "${d.name}" — available in Simulator`;
}

initChart();
</script>
